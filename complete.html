<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>S5 - 업무 완료</title>
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/common.css">
  <link rel="stylesheet" href="css/s2.css">
  <link rel="stylesheet" href="css/s5.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
  <div class="app">
    <header class="gnb">
      <div class="gnb__top">
        <a href="index.html" class="gnb__logo">codeit</a>
        <a href="#" class="gnb__top-link">고객센터</a>
        <a href="#" class="gnb__top-link">팀 요금제</a>
        <a href="#" class="gnb__top-link">로그인</a>
      </div>
      <div class="gnb__main">
        <button class="gnb__dropdown">모든 강의 <svg xmlns="http://www.w3.org/2000/svg" class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg></button>
        <span class="gnb__tag">국비</span>
        <span class="gnb__tag-label">단기 완성</span>
        <div class="gnb__search">
          <svg xmlns="http://www.w3.org/2000/svg" class="icon gnb__search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
          <input type="text" class="gnb__search-input" placeholder="어떤 강의를 찾고 있나요?">
        </div>
        <nav class="gnb__menu">
          <a href="#" class="gnb__menu-link">커뮤니티</a>
          <a href="#" class="gnb__menu-link">수강 후기</a>
          <a href="#" class="gnb__menu-link">챌린지</a>
        </nav>
        <div class="gnb__actions">
          <button class="gnb__btn-primary">멤버십 안내</button>
          <button class="gnb__icon-btn" aria-label="알림">
            <svg xmlns="http://www.w3.org/2000/svg" class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a2 2 0 0 0 3.4 0"/></svg>
          </button>
          <div class="gnb__avatar">H</div>
        </div>
      </div>
    </header>

    <div class="app__body">
      <aside class="sidebar">
        <a href="#" class="sidebar__item"><svg xmlns="http://www.w3.org/2000/svg" class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 10.5 12 3l9 7.5V20a1.5 1.5 0 0 1-1.5 1.5h-4V14h-7v7.5h-4A1.5 1.5 0 0 1 3 20z"/></svg>홈</a>
        <a href="#" class="sidebar__item"><svg xmlns="http://www.w3.org/2000/svg" class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 5.5A2.5 2.5 0 0 1 6.5 3H20v15H6.5A2.5 2.5 0 0 0 4 20.5z"/><path d="M4 20.5A2.5 2.5 0 0 1 6.5 18H20v3H6.5A2.5 2.5 0 0 1 4 18.5"/></svg>내 수업</a>
        <a href="#" class="sidebar__item"><svg xmlns="http://www.w3.org/2000/svg" class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>재생 목록</a>
        <a href="s1-inbox.html" class="sidebar__item sidebar__item--active">
          <svg xmlns="http://www.w3.org/2000/svg" class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a8 8 0 0 1-11.6 7.1L4 20l.9-5.4A8 8 0 1 1 21 12Z"/></svg>업무 채널
          <span class="sidebar__badge">2</span>
        </a>
        <a href="s6-portfolio.html" class="sidebar__item"><svg xmlns="http://www.w3.org/2000/svg" class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 3H6a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9zM14 3v6h6"/></svg>포트폴리오</a>
      </aside>

      <main class="app__main">
        <div class="detail">
          <a href="s1-inbox.html" class="detail__back">
            <svg xmlns="http://www.w3.org/2000/svg" class="icon icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
            업무함으로
          </a>

          <article class="detail-card">
            <header class="detail-card__header" style="justify-content: space-between;">
              <div style="display:flex; align-items:center; gap:16px;">
                <div class="avatar avatar--blue avatar--lg">김</div>
                <div class="detail-card__header-text">
                  <h2 class="detail-card__sender">김지훈 팀장</h2>
                  <div class="detail-card__meta">
                    <span>오늘 오전 10:22</span>
                    <span class="detail-card__meta-divider"></span>
                    <span>소요시간 24분/30분</span>
                  </div>
                </div>
              </div>
              <div class="complete-card__status-tag">납기 준수</div>
            </header>

            <div class="detail-card__body">
              <div class="feedback">
                <div class="feedback__head">
                  <span class="feedback__tag feedback__tag--good">잘 됨</span>
                  <h3 class="feedback__title">컬러 토큰 적용이 일관성 있게 잘 됐어요.</h3>
                </div>
                <button class="feedback__toggle">
                  <svg xmlns="http://www.w3.org/2000/svg" class="icon icon-sm" viewBox="0 0 24 24" fill="currentColor"><path d="M7 10l5 5 5-5z"/></svg>
                  왜 중요한가
                </button>
                <p class="feedback__desc">협업 시 개발자가 코드를 바로 매칭할 수 있어 생산성이 높아집니다. 일관된 디자인 시스템 적용은 장기적인 유지보수 비용을 크게 절감시킵니다.</p>
              </div>

              <div class="feedback">
                <div class="feedback__head">
                  <span class="feedback__tag feedback__tag--fix">개선</span>
                  <h3 class="feedback__title">hover 상태 명세가 빠져 있어요.</h3>
                </div>
                <button class="feedback__toggle">
                  <svg xmlns="http://www.w3.org/2000/svg" class="icon icon-sm" viewBox="0 0 24 24" fill="currentColor"><path d="M7 10l5 5 5-5z"/></svg>
                  왜 중요한가
                </button>
              </div>
            </div>
          </article>

          <div class="final-cta">
            <div class="final-cta__hint">
              <svg xmlns="http://www.w3.org/2000/svg" class="icon icon-xs" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><line x1="12" y1="11" x2="12" y2="16"/><circle cx="12" cy="8" r="0.8" fill="currentColor"/></svg>
              저장하면 누적 결과 리포트가 업데이트됩니다
            </div>
            <div>
              <a href="s6-portfolio.html" class="final-cta__btn" style="display:inline-flex; align-items:center; justify-content:center; text-decoration:none;">포트폴리오에 저장</a>
            </div>
          </div>
        </div>
      </main>
    </div>
  </div>
  <script src="js/main.js"></script>
</body>
</html>
